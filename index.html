<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buildora | Custom Web Design & Local SEO Agency</title>
    <meta name="description" content="Buildora builds high-converting, custom websites for local businesses, contractors, salons, and professional services starting at $399. Fast, mobile-optimized, and engineered to rank on Google." />
    <meta name="keywords" content="web design, local web design, website builder, SEO agency, web development, salon websites, contractor websites, small business website design, Buildora" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="google-site-verification" content="google0fd9aab7e2e42477" />
    <meta name="theme-color" content="#0F172A" />

    <!-- Performance preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Canonical & Sitemap & AI files -->
    <link rel="canonical" href="https://www.buildorawebdesign.com/" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://www.buildorawebdesign.com/sitemap.xml" />
    <link rel="author" href="https://www.buildorawebdesign.com/llms.txt" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.buildorawebdesign.com/" />
    <meta property="og:title" content="Buildora | Custom Web Design & Local SEO Agency" />
    <meta property="og:description" content="High-performance custom web design & local SEO for growing businesses. Transparent pricing, 3–10 day turnaround, zero lock-in contracts." />
    <meta property="og:site_name" content="Buildora" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.buildorawebdesign.com/" />
    <meta name="twitter:title" content="Buildora | Custom Web Design & Local SEO Agency" />
    <meta name="twitter:description" content="High-performance custom web design & local SEO for growing businesses. Transparent pricing, 3–10 day turnaround, zero lock-in contracts." />

    <!-- Structured Data (JSON-LD) - Organization & LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.buildorawebdesign.com/#organization",
          "name": "Buildora Web Design Agency",
          "url": "https://www.buildorawebdesign.com",
          "logo": "https://www.buildorawebdesign.com/icon.svg",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+1-437-784-9500",
            "contactType": "customer service",
            "email": "contact@buildora.ca",
            "areaServed": ["CA", "US"],
            "availableLanguage": ["en"]
          },
          "sameAs": [
            "https://www.buildorawebdesign.com"
          ]
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://www.buildorawebdesign.com/#localbusiness",
          "name": "Buildora Web Design",
          "url": "https://www.buildorawebdesign.com",
          "telephone": "+1-437-784-9500",
          "email": "contact@buildora.ca",
          "priceRange": "$$",
          "description": "High-performance custom web design, local SEO, and fast websites for small businesses, contractors, salons, and professional services.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Toronto",
            "addressRegion": "ON",
            "addressCountry": "CA"
          },
          "geo": {
            "@type": "GeoCoordinates",
            "latitude": 43.6532,
            "longitude": -79.3832
          },
          "openingHoursSpecification": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday"
            ],
            "opens": "09:00",
            "closes": "18:00"
          },
          "offers": [
            {
              "@type": "Offer",
              "name": "Starter Web Design Plan",
              "price": "399",
              "priceCurrency": "CAD",
              "description": "1-3 pages high-converting starter website setup"
            },
            {
              "@type": "Offer",
              "name": "Professional Web Design Plan",
              "price": "999",
              "priceCurrency": "CAD",
              "description": "Up to 10 pages custom website with local SEO & schema optimization"
            }
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.buildorawebdesign.com/#website",
          "url": "https://www.buildorawebdesign.com",
          "name": "Buildora",
          "publisher": {
            "@id": "https://www.buildorawebdesign.com/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.buildorawebdesign.com/web-design-services?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
