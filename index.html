<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="google-site-verification" content="google0fd9aab7e2e42477" />
    <meta name="theme-color" content="#0F172A" />

    <link rel="canonical" href="https://buildoradesigning.com/" />

    <link rel="author" href="/llms.txt" />

    <meta property="og:type" content="website" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Buildora Web Design",
      "url": "https://buildoradesigning.com",
      "telephone": "+14377849500",
      "email": "jackobjack16@gmail.com",
      "priceRange": "$$",
      "description": "High-performance custom web design, local SEO, and fast websites for small businesses and contractors.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Toronto",
        "addressRegion": "ON",
        "addressCountry": "CA"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 43.6532,
        "longitude": -79.3832
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://buildoradesigning.com"
      ],
      "offers": [
        {
          "@type": "Offer",
          "name": "Starter Web Design Plan",
          "price": "399",
          "priceCurrency": "CAD",
          "description": "1-3 pages high-converting starter website setup"

        {
          "@type": "Offer",

          "price": "999",
          "priceCurrency": "CAD",
          "description": "Up to 10 pages custom website with local SEO & schema optimization"
        }
      ]

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Buildora",
      "url": "https://buildoradesigning.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://buildoradesigning.com/web-design-services?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
